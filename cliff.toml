# git-cliff configuration for release-plz
# Based on Keep a Changelog format

[changelog]
# Header intentionally empty: the markdown title + Keep-a-Changelog blurb live
# at the top of CHANGELOG.md permanently. release-plz invokes git-cliff in
# prepend-mode for every release PR, and a non-empty header here gets emitted
# into the diff each time — PR #339 (2026-05-19) shipped a broken CHANGELOG
# because the header block was injected under `[Unreleased]`. Keeping this
# empty makes the emitted entry idempotent across release cycles.
header = ""
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [Unreleased]
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
    { pattern = "\\(([^)]+)\\)!", replace = "(breaking: ${1})" },
]
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },
    { message = "^ci", group = "Changed" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Changed" },
    { message = "^docs", group = "Changed" },
    { message = "^test", group = "Changed" },
    { message = "^style", group = "Changed" },
    { body = "^.+", group = "Changed" },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]+.[0-9]+.[0-9]+"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
