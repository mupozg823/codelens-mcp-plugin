# ─────

[[tool]]
name = "prepare_harness_session"
category = "session"
description = "[CodeLens:Session] Official bootstrap/status entrypoint for harnesses — pass project=<absolute repo path> on first use to remap stale daemon state, then summarize surface, capabilities, visible tools, and optionally auto-recover a small stale index in one call."
annotations = "mutating"
output_schema = "prepare_harness_session_output_schema"

[tool.input_schema]
type = "object"
[tool.input_schema.properties]
project = { type = "string", description = "Optional project name or path" }
profile = { type = "string", enum = ["planner-readonly", "builder-minimal", "reviewer-graph", "refactor-full", "ci-audit"] }
preset = { type = "string", enum = ["minimal", "balanced", "full"] }
token_budget = { type = "integer", description = "Optional explicit token budget override after activation" }
file_path = { type = "string", description = "Optional file path for language-specific capability checks" }
detail = { type = "string", enum = ["compact", "full"], description = "compact returns the harness preflight essentials only; full also includes the heavier config snapshot" }
host_context = { type = "string", enum = ["claude-code", "codex", "cursor", "cline", "windsurf", "vscode", "jetbrains", "api-agent"], description = "Optional host/runtime hint used to compile advisory bootstrap routing without changing the active tool surface" }
task_overlay = { type = "string", enum = ["planning", "editing", "review", "onboarding", "batch-analysis", "interactive"], description = "Optional task-mode hint used to compile advisory bootstrap routing without changing the active tool surface" }
preferred_entrypoints = { type = "array", items = { type = "string" }, description = "Optional ordered entrypoints so the server can report which are immediately visible. Accepts canonical tool names or mcp__codelens__-prefixed host names." }
known_tool_schema_fingerprint = { type = "string", description = "Optional client-observed tool_schema_fingerprint. If it differs from the active surface, prepare_harness_session emits a tool_schema_cache_stale warning with refresh guidance." }
auto_refresh_stale = { type = "boolean", description = "When true (default), bootstrap auto-refreshes a small stale symbol index before reporting capabilities" }
auto_refresh_stale_threshold = { type = "integer", description = "Maximum stale file count eligible for automatic refresh during bootstrap (default 32)" }

