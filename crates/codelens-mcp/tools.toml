description = "[CodeLens:Workflow] Verifier-first preflight: blockers, readiness, and next evidence before editing."
annotations = "ro_w"
output_schema = "analysis_handle_output_schema"
max_response_tokens = 2048

[tool.input_schema]
type = "object"
required = ["task"]
[tool.input_schema.properties]
task = { type = "string" }
changed_files = { type = "array", items = { type = "string" } }
profile_hint = { type = "string", enum = ["planner-readonly", "builder-minimal", "reviewer-graph", "refactor-full", "ci-audit"] }
