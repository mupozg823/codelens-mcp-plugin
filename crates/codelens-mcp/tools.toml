# CodeLens MCP — declarative tool registry source-of-truth.
#
# This file is read by `scripts/regen-tool-defs.py` to produce the
# generated Rust modules under `src/tool_defs/generated/`. It is the
# single hand-edited source for tool registration data; the Rust
# generated files exist only so reviewers and rust-analyzer can grep
# the actual Tool::new lines.
#
# Add a new tool by appending a `[[tool]]` table and running:
#
#     python3 scripts/regen-tool-defs.py --write
#
# CI runs the script with `--check`; a drift fails the workflow with
# a one-line "run --write" hint. See ADR-0013 for the full rationale.
#
# ── Migration status (ADR-0013 §Decision §4) ─────────────────────────
# Each PR migrates one tool category from the hand-rolled `build.rs`
# block to this file. Categories already in TOML:
#
#   ✓ file_io          — PR-A
#   ✓ symbol           — PR-B
#   ✓ lsp              — PR-B
#   ✓ editing          — PR-C
#   ✓ analysis         — PR-C
#   ✓ composite        — PR-D
#   ✓ workflow_first   — PR-E
#   ✓ session          — PR-E
#   ✓ rule_corpus      — PR-F (this PR)
#   ✓ memory           — PR-F (this PR)
#   ✓ semantic         — PR-F (this PR; cfg-gated via feature_gate)
#
# All categories are now migrated. `build.rs` retains only the
# annotation-binding locals and per-tool postprocessing (namespace,
# title, estimated_tokens) — the Tool registry itself is fully
# declarative.

schema_version = "v1"

# ── File I/O ─────────────────────────────────────────────────────────

[[tool]]
name = "get_current_config"
category = "file_io"
description = "[CodeLens:Session] Project config and index stats. Use to verify project is active."
annotations = "ro_p"
output_schema = "get_current_config_output_schema"

[tool.input_schema]
type = "object"
properties = {}

# ─────

[[tool]]
name = "read_file"
category = "file_io"
description = "[CodeLens:File] Read file contents with optional line range."
annotations = "ro_p"
output_schema = "file_content_output_schema"

[tool.input_schema]
type = "object"
required = ["relative_path"]
properties = { relative_path = { type = "string" }, start_line = { type = "integer" }, end_line = { type = "integer" } }

# ─────

[[tool]]
name = "list_dir"
category = "file_io"
description = "[CodeLens:File] List directory contents, optionally recursive."
annotations = "ro_p"

[tool.input_schema]
type = "object"
required = ["relative_path"]
properties = { relative_path = { type = "string" }, recursive = { type = "boolean" } }

# ─────

[[tool]]
name = "find_file"
category = "file_io"
description = "[CodeLens:File] Find files by wildcard pattern."
annotations = "ro_p"

[tool.input_schema]
type = "object"
required = ["wildcard_pattern"]
properties = { wildcard_pattern = { type = "string" }, relative_dir = { type = "string" } }

# ─────

[[tool]]
name = "search_for_pattern"
category = "file_io"
description = "[CodeLens:File] Regex search across files. Use smart=true for enclosing symbol context."
annotations = "ro_p"
output_schema = "search_for_pattern_output_schema"

[tool.input_schema]
type = "object"
[tool.input_schema.properties]
pattern = { type = "string" }
substring_pattern = { type = "string" }
file_glob = { type = "string" }
max_results = { type = "integer" }
smart = { type = "boolean", description = "Include enclosing symbol context for each match" }
context_lines = { type = "integer", description = "Number of context lines before and after each match (default 0)" }
context_lines_before = { type = "integer", description = "Context lines before each match (overrides context_lines)" }
context_lines_after = { type = "integer", description = "Context lines after each match (overrides context_lines)" }

# ─────

[[tool]]
name = "find_annotations"
category = "file_io"
description = "[CodeLens:File] Find TODO/FIXME/HACK comments across the project."
annotations = "ro_p"
output_schema = "find_annotations_output_schema"

[tool.input_schema]
type = "object"
properties = { tags = { type = "string" }, max_results = { type = "integer" } }

# ─────

[[tool]]
name = "find_tests"
category = "file_io"
description = "[CodeLens:File] Find test functions and test modules."
annotations = "ro_p"
output_schema = "find_tests_output_schema"

[tool.input_schema]
type = "object"
properties = { path = { type = "string" }, max_results = { type = "integer" } }

# ── Symbol Lookup ────────────────────────────────────────────────────

[[tool]]
name = "get_symbols_overview"
category = "symbol"
description = "[CodeLens:Symbol] List all symbols in a file — structural map. Use first to understand a file."
annotations = "ro_p"
output_schema = "symbol_output_schema"

[tool.input_schema]
type = "object"
required = ["path"]
properties = { path = { type = "string" }, depth = { type = "integer" } }

# ─────

[[tool]]
name = "find_symbol"
category = "symbol"
description = "[CodeLens:Symbol] Find function/class by exact name. Returns signature + body. Use `name` (canonical). Legacy `name_path` is accepted for one release with deprecation warning. `include_body=true` returns full body via tree-sitter; SCIP backend currently returns signature only (#172)."
annotations = "ro_p"
output_schema = "symbol_output_schema"

[tool.input_schema]
type = "object"
[tool.input_schema.properties]
name = { type = "string", description = "Symbol name to search for" }
symbol_id = { type = "string", description = "Stable symbol ID (file#kind:name_path). Overrides name." }
file_path = { type = "string" }
include_body = { type = "boolean" }
exact_match = { type = "boolean" }
max_matches = { type = "integer" }
name_path = { type = "string", description = "DEPRECATED v1.13.23 — use `name`. Soft alias maintained until v1.14.0." }

# ─────

[[tool]]
name = "get_ranked_context"
category = "symbol"
description = "[CodeLens:Symbol] Smart context retrieval — best symbols for a query within token budget. For natural-language queries, set expand_query=false to skip n-gram expansion; for partial-identifier search use the default."
annotations = "ro_a"
output_schema = "ranked_context_output_schema"
max_response_tokens = 32768

[tool.input_schema]
type = "object"
required = ["query"]
[tool.input_schema.properties]
query = { type = "string" }
path = { type = "string" }
max_tokens = { type = "integer", description = "Token budget for the retrieval payload. Defaults to max(active surface budget, 16384) — raised in v1.10.1 from the surface budget alone to avoid Stage 5 truncation on hybrid retrieval." }
context_window = { type = "integer", description = "Host model's context window in tokens (e.g. 1000000 for Opus 4.7, 200000 for Sonnet 4.6). When supplied AND max_tokens is unset, the budget scales adaptively: ≥1M → ×4 cap 128K, ≥200K → ×2 cap 64K, ≥32K → ×1 cap 32K, smaller → ×0.5 cap 16K. v1.13.18+." }
include_body = { type = "boolean" }
depth = { type = "integer" }
disable_semantic = { type = "boolean", description = "Disable semantic/hybrid ranking and use structural signals only" }
expand_query = { type = "boolean", description = "When true (default), expand the query with snake_case / camelCase / cartesian-token derivatives. Set to false for natural-language queries that don't benefit from expansion." }

# ─────

[[tool]]
name = "bm25_symbol_search"
category = "symbol"
description = "[CodeLens:Symbol] Sparse BM25-F symbol retrieval — best for identifiers, signatures, path tokens, and short lexical phrases."
annotations = "ro_a"
output_schema = "bm25_symbol_search_output_schema"

[tool.input_schema]
type = "object"
required = ["query"]
[tool.input_schema.properties]
query = { type = "string" }
max_results = { type = "integer", description = "Maximum number of results to return (default 10)" }
include_tests = { type = "boolean", description = "Include test symbols in the candidate pool" }
include_generated = { type = "boolean", description = "Include generated symbols in the candidate pool" }

# ─────

[[tool]]
name = "search_symbols_fuzzy"
category = "symbol"
description = "[CodeLens:Symbol] Fuzzy symbol search — tolerates typos and partial names."
annotations = "ro_a"

[tool.input_schema]
type = "object"
required = ["query"]
[tool.input_schema.properties]
query = { type = "string", description = "Symbol name to search for" }
max_results = { type = "integer", description = "Maximum number of results to return (default 30)" }
fuzzy_threshold = { type = "number", description = "Minimum jaro_winkler similarity 0.0-1.0 for fuzzy matches (default 0.6)" }
disable_semantic = { type = "boolean", description = "Disable semantic score blending and use lexical search only" }

# ─────

[[tool]]
name = "get_complexity"
category = "symbol"
description = "[CodeLens:Analysis] Cyclomatic complexity for functions. Use to find code needing refactoring."
annotations = "ro_a"

[tool.input_schema]
type = "object"
required = ["path"]
properties = { path = { type = "string" }, symbol_name = { type = "string" } }

# ─────

[[tool]]
name = "refresh_symbol_index"
category = "symbol"
description = "[CodeLens:Symbol] Rebuild the symbol database. Use if index is stale."
annotations = "mut_w"

[tool.input_schema]
type = "object"
properties = {}

# ─────

[[tool]]
name = "get_project_structure"
category = "symbol"
description = "[CodeLens:Symbol] Directory-level overview — file counts and symbol density per directory."
annotations = "ro_p"
output_schema = "get_project_structure_output_schema"

[tool.input_schema]
type = "object"
properties = {}

# ── LSP (type-aware operations) ──────────────────────────────────────

[[tool]]
name = "find_referencing_symbols"
category = "lsp"
description = "[CodeLens:Symbol] Find all usages of a symbol. use_lsp=true for type-aware precision."
annotations = "ro_p"
output_schema = "references_output_schema"

[tool.input_schema]
type = "object"
required = ["file_path"]
[tool.input_schema.properties]
file_path = { type = "string", description = "File containing or declaring the symbol" }
symbol_name = { type = "string", description = "Symbol name (default: tree-sitter search)" }
line = { type = "integer", description = "Line number (triggers LSP path)" }
column = { type = "integer", description = "Column number (triggers LSP path)" }
use_lsp = { type = "boolean", description = "Force LSP lookup (slower but type-aware, requires LSP server)" }
command = { type = "string" }
args = { type = "array", items = { type = "string" } }
max_results = { type = "integer" }

# ─────

[[tool]]
name = "get_file_diagnostics"
category = "lsp"
description = "[CodeLens:Symbol] Type errors and lint issues via LSP. Use after editing code."
annotations = "ro_p"
output_schema = "diagnostics_output_schema"

[tool.input_schema]
type = "object"
required = ["file_path"]
[tool.input_schema.properties]
file_path = { type = "string" }
command = { type = "string" }
args = { type = "array", items = { type = "string" } }
max_results = { type = "integer" }

# ─────

[[tool]]
name = "search_workspace_symbols"
category = "lsp"
description = "[CodeLens:Symbol] LSP workspace symbol search. Use when you need type-system-aware results. Requires an LSP server binary via `command` (e.g. rust-analyzer / pyright); the handler returns a structured hint toward `bm25_symbol_search` when omitted."
annotations = "ro_p"

[tool.input_schema]
type = "object"
required = ["query"]
[tool.input_schema.properties]
query = { type = "string" }
command = { type = "string" }
args = { type = "array", items = { type = "string" } }
max_results = { type = "integer" }

# ─────

[[tool]]
name = "get_type_hierarchy"
category = "lsp"
description = "[CodeLens:Symbol] Inheritance hierarchy — supertypes and subtypes of a class/interface."
annotations = "ro_a"
output_schema = "get_type_hierarchy_output_schema"

[tool.input_schema]
type = "object"
[tool.input_schema.properties]
name_path = { type = "string" }
fully_qualified_name = { type = "string" }
relative_path = { type = "string" }
hierarchy_type = { type = "string", enum = ["super", "sub", "both"] }
depth = { type = "integer" }
command = { type = "string" }
args = { type = "array", items = { type = "string" } }

# ─────

[[tool]]
name = "resolve_symbol_target"
category = "lsp"
description = "[CodeLens:Symbol] Resolve declaration/definition/implementation/type target through LSP. Use when edit-grade navigation authority is required."
annotations = "ro_a"
output_schema = "resolve_symbol_target_output_schema"

[tool.input_schema]
type = "object"
required = ["file_path", "line", "column"]
[tool.input_schema.properties]
file_path = { type = "string" }
line = { type = "integer", description = "1-based source line" }
column = { type = "integer", description = "1-based byte column; converted to LSP UTF-16 internally" }
target = { type = "string", enum = ["declaration", "definition", "implementation", "type_definition"], description = "Target kind (default: definition)" }
semantic_backend = { type = "string", enum = ["lsp"], description = "Only lsp is authoritative for this tool" }
command = { type = "string" }
args = { type = "array", items = { type = "string" } }
max_results = { type = "integer" }

# ─────

[[tool]]
name = "plan_symbol_rename"
category = "lsp"
description = "[CodeLens:Symbol] Preview rename refactoring via LSP — check before applying."
annotations = "ro_a"

[tool.input_schema]
type = "object"
required = ["file_path", "line", "column"]
[tool.input_schema.properties]
file_path = { type = "string" }
line = { type = "integer" }
column = { type = "integer" }
new_name = { type = "string" }
command = { type = "string" }
args = { type = "array", items = { type = "string" } }

# ─────

[[tool]]
name = "check_lsp_status"
category = "lsp"
description = "[CodeLens:Session] Check installed LSP servers with install commands."
annotations = "ro_p"

[tool.input_schema]
type = "object"
properties = {}

# ─────

[[tool]]
name = "get_lsp_recipe"
category = "lsp"
description = "[CodeLens:Session] Get LSP server install instructions for a file extension."
annotations = "ro_p"

[tool.input_schema]
type = "object"
required = ["extension"]
properties = { extension = { type = "string", description = "File extension (e.g. 'py', 'rs')" } }

# ── Analysis (architecture & dependencies) ───────────────────────────

[[tool]]
name = "get_changed_files"
category = "analysis"
description = "[CodeLens:Analysis] Files changed since a git ref with symbol counts. Use for diff review."
annotations = "ro_p"
output_schema = "changed_files_output_schema"

[tool.input_schema]
type = "object"
properties = { ref = { type = "string" }, include_untracked = { type = "boolean" } }

# ─────

[[tool]]
name = "get_callers"
category = "analysis"
description = "[CodeLens:Analysis] Find functions that call a function. Returns bounded call-graph edges with backend/confidence metadata."
annotations = "ro_a"
output_schema = "get_callers_output_schema"

[tool.input_schema]
type = "object"
required = ["function_name"]
[tool.input_schema.properties]
function_name = { type = "string" }
file_path = { type = "string", description = "Optional file scope for caller search" }
max_results = { type = "integer" }

# ─────

[[tool]]
name = "get_callees"
category = "analysis"
description = "[CodeLens:Analysis] Find functions called by a function. Use file_path when duplicate function names exist."
annotations = "ro_a"
output_schema = "get_callees_output_schema"

[tool.input_schema]
type = "object"
required = ["function_name"]
properties = { function_name = { type = "string" }, file_path = { type = "string" }, max_results = { type = "integer" } }

# ─────

[[tool]]
name = "find_scoped_references"
category = "analysis"
description = "[CodeLens:Analysis] Classify each reference as definition/read/write/import."
annotations = "ro_a"
output_schema = "references_output_schema"

[tool.input_schema]
type = "object"
required = ["symbol_name"]
[tool.input_schema.properties]
symbol_name = { type = "string", description = "Symbol name to find references for" }
file_path = { type = "string", description = "Declaration file (for sorting, optional)" }
max_results = { type = "integer", description = "Max results (default 50)" }

# ─────

[[tool]]
name = "get_symbol_importance"
category = "analysis"
description = "[CodeLens:Analysis] PageRank file importance — find the most critical files in the project."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = { top_n = { type = "integer" } }

# ─────

[[tool]]
name = "find_circular_dependencies"
category = "analysis"
description = "[CodeLens:Analysis] Detect circular imports using Tarjan SCC algorithm."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = { max_results = { type = "integer" } }

# ─────

[[tool]]
name = "find_redundant_definitions"
category = "analysis"
description = "[CodeLens:Analysis] Find Rust thin-wrapper functions whose body is a single call to another function with one literal default. Output groups by target so multi-wrapper substrates surface as cleanup clusters."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = { max_results = { type = "integer" } }

# ─────

[[tool]]
name = "audit_tool_surface_consistency"
category = "analysis"
description = "[CodeLens:Analysis] Cross-check `tools.toml` entries against `dispatch_table()` macro arms and report drift. `missing_in_dispatch` = registered in toml but no handler arm; `missing_in_toml` = dispatched but missing schema entry. Catches deletion-cascade asymmetry that would otherwise surface as runtime `tool not found` or schema validation failures."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = {}

# ─────

[[tool]]
name = "find_orphan_handlers"
category = "analysis"
description = "[CodeLens:Analysis] Find ToolHandler-shaped functions in `crates/codelens-mcp/src/tools/` that are neither registered in dispatch tables (`tools/mod.rs` macro arms or `dispatch/table.rs` Arc::new inserts) nor referenced from any other workspace .rs file. v2 added the cross-file reference check so handler-shaped helpers (a `*_tool` calling another via path) no longer surface as false orphans."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = {}

# ─────

[[tool]]
name = "find_over_visible_apis"
category = "analysis"
description = "[CodeLens:Analysis] Find `pub` / `pub(crate)` declarations whose references all stay inside a narrower scope than they advertise. `pub` with no cross-crate caller → suggest `pub(crate)`. `pub(crate)` with no other-file caller → suggest dropping visibility. Complements find_phantom_modules / find_redundant_definitions: those find dead surface, this one finds too-wide surface that compiler warnings cannot catch because the items are still in use, just not by anyone outside the declaring boundary."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = {}

# ─────

[[tool]]
name = "find_phantom_modules"
category = "analysis"
description = "[CodeLens:Analysis] Find `mod NAME;` declarations whose name is never referenced as a path segment elsewhere in the workspace. Reports both private and public mods; visibility is included so callers can filter. Known limitation: impl-extension pattern (file split where the module only adds `impl X { ... }` to a parent type) is reported but is not actually phantom — manual review required."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = { max_results = { type = "integer" } }

# ─────

[[tool]]
name = "get_change_coupling"
category = "analysis"
description = "[CodeLens:Analysis] Files that frequently change together in git history."
annotations = "ro_a"

[tool.input_schema]
type = "object"
properties = { months = { type = "integer" }, min_strength = { type = "number" }, min_commits = { type = "integer" }, max_results = { type = "integer" } }

# ── Editing (code mutations) ─────────────────────────────────────────

[[tool]]
name = "rename_symbol"
category = "editing"
description = "[CodeLens:Edit] Rename across project — safe multi-file refactoring. Use dry_run=true to preview."
annotations = "dest_a"
output_schema = "rename_output_schema"

[tool.input_schema]
type = "object"
required = ["file_path", "new_name"]
[tool.input_schema.properties]
file_path = { type = "string", description = "File containing the symbol declaration" }
symbol_name = { type = "string", description = "Current symbol name" }
name = { type = "string", description = "Alias for symbol_name" }
new_name = { type = "string", description = "Desired new name" }
name_path = { type = "string", description = "Qualified name path (e.g. 'Class/method')" }
scope = { type = "string", enum = ["file", "project"], description = "Rename scope (default: project; tree-sitter backend only)" }
semantic_edit_backend = { type = "string", enum = ["tree-sitter", "lsp", "jetbrains", "roslyn"], description = "Opt-in precise edit backend. lsp uses inspectable WorkspaceEdit APIs; jetbrains/roslyn are fail-closed adapter boundaries until a local adapter is configured." }
line = { type = "integer", description = "1-based declaration line for semantic_edit_backend=lsp; derived from symbol index when omitted" }
column = { type = "integer", description = "1-based declaration column for semantic_edit_backend=lsp; derived from symbol index when omitted" }
command = { type = "string", description = "Optional LSP server command for semantic_edit_backend=lsp" }
args = { type = "array", items = { type = "string" }, description = "Optional LSP server args for semantic_edit_backend=lsp" }
dry_run = { type = "boolean", description = "Preview changes without modifying files" }

# ─────

[[tool]]
name = "replace_symbol_body"
category = "editing"
description = "[CodeLens:Edit] Replace function/class body by name — tree-sitter finds boundaries. No line numbers needed."
annotations = "mut_w"
output_schema = "file_content_output_schema"

[tool.input_schema]
type = "object"
required = ["relative_path", "symbol_name", "new_body"]
properties = { relative_path = { type = "string" }, symbol_name = { type = "string" }, name_path = { type = "string" }, new_body = { type = "string" } }

# ─────

[[tool]]
name = "replace_content"
category = "editing"
description = "[CodeLens:Edit] Find-and-replace text in a file — literal or regex mode."
annotations = "mut_p"
output_schema = "replace_content_output_schema"

[tool.input_schema]
type = "object"
required = ["relative_path", "old_text", "new_text"]
properties = { relative_path = { type = "string" }, old_text = { type = "string" }, new_text = { type = "string" }, regex_mode = { type = "boolean" } }

