[[tool]]
name = "search"
category = "symbol"
namespace = "symbols"
phase = "plan"
default_visible_rank = 80
preset_tags = ["minimal", "planner-readonly", "builder-minimal", "reviewer-graph"]
description = "[CodeLens:Verb] Find code — one mode-routed entry point. mode=symbol (exact name) | refs (usages) | defn (declaration) | impl (implementations) | scoped | workspace | bm25 | fuzzy | semantic (meaning) | ranked (budgeted context). Remaining parameters pass through to the target tool unchanged."
annotations = "ro_w"

[tool.input_schema]
type = "object"
required = ["mode"]
[tool.input_schema.properties]
mode = { type = "string", enum = ["symbol", "refs", "defn", "impl", "scoped", "workspace", "bm25", "fuzzy", "semantic", "ranked"], description = "Which search family to run; other params pass through to the target tool" }
name = { type = "string", description = "Symbol name (mode=symbol)" }
query = { type = "string", description = "Search query (mode=semantic|ranked|bm25|fuzzy|workspace)" }
path = { type = "string", description = "File or directory scope" }
symbol_name = { type = "string", description = "Symbol to look up references for (mode=refs|scoped|defn|impl)" }
include_body = { type = "boolean" }
max_results = { type = "integer" }
use_lsp = { type = "boolean", description = "Type-aware precision (mode=refs|defn|impl)" }

