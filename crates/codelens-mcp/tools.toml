annotations = "ro_a"
feature_gate = "semantic"

[tool.input_schema]
type = "object"
properties = { threshold = { type = "number", minimum = 0, maximum = 1, description = "Cosine similarity threshold (default 0.85)" }, max_pairs = { type = "integer", minimum = 1, maximum = 500, description = "Cap on returned duplicate pairs (default 20)" }, include_config_code_pairs = { type = "boolean", description = "Include config-vs-config / config-vs-code structural-key pairs (CI YAML env/runs_on, shared keys) that are suppressed by default as G6.1 noise (default false)" } }

