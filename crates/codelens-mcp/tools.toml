# CodeLens MCP — declarative tool registry source-of-truth.
#
# This file is read by `scripts/regen-tool-defs.py` to produce the
# generated Rust modules under `src/tool_defs/generated/`. It is the
# single hand-edited source for tool registration data; the Rust
# generated files exist only so reviewers and rust-analyzer can grep
# the actual Tool::new lines.
#
# Add a new tool by appending a `[[tool]]` table and running:
#
#     python3 scripts/regen-tool-defs.py --write
#
# CI runs the script with `--check`; a drift fails the workflow with
# a one-line "run --write" hint. See ADR-0013 for the full rationale.
#
# ── Migration status (ADR-0013 §Decision §4) ─────────────────────────
# Each PR migrates one tool category from the hand-rolled `build.rs`
# block to this file. Categories already in TOML:
#
#   ✓ file_io          — PR-A
#   ✓ symbol           — PR-B
#   ✓ lsp              — PR-B
#   ✓ editing          — PR-C
#   ✓ analysis         — PR-C
#   ✓ composite        — PR-D
#   ✓ workflow_first   — PR-E
#   ✓ session          — PR-E
#   ✓ rule_corpus      — PR-F (this PR)
#   ✓ memory           — PR-F (this PR)
#   ✓ semantic         — PR-F (this PR; cfg-gated via feature_gate)
#
# All categories are now migrated. `build.rs` retains only the
# annotation-binding locals and per-tool postprocessing for derived
# fields such as title/estimated_tokens. Per-tool routing metadata
# (feature_gate, phase, namespace, annotations, default_visible_rank)
# is generated from this file.

schema_version = "v1"
content_mutation_tools = [
    "replace_symbol_body",
    "insert_before_symbol",
    "insert_after_symbol",
    "rename_symbol",
    "write_memory",
    "delete_memory",
    "rename_memory",
    "archive_memory",
    "restore_memory",
    "add_queryable_project",
    "remove_queryable_project",
    "refactor_extract_function",
    "refactor_inline_function",
    "refactor_move_to_file",
    "refactor_change_signature",
]

[experimental_features]
secondary-projects = ["add_queryable_project", "remove_queryable_project", "query_project", "list_queryable_projects"]
orchestration = ["orchestrate_change"]

# ── File I/O ─────────────────────────────────────────────────────────

[[tool]]
name = "get_current_config"
category = "file_io"
namespace = "session"
default_visible_rank = 20
preset_tags = ["minimal", "planner-readonly", "builder-minimal"]
description = "[CodeLens:Session] Project config, index stats, and activation status. If project_root is not the intended workspace, re-activate the session with an absolute project path; do not abandon CodeLens because the active project is stale."
annotations = "ro_p"
output_schema = "get_current_config_output_schema"

[tool.input_schema]
type = "object"
properties = {}

# ─────

[[tool]]
name = "read_file"
category = "file_io"
namespace = "filesystem"
preset_tags = ["minimal", "balanced-excluded"]
description = "[CodeLens:File] Read file contents with optional line range. Use `path` (canonical). Legacy `relative_path` is accepted for one release with a deprecation warning."
annotations = "ro_p"
output_schema = "file_content_output_schema"

[tool.input_schema]
type = "object"
required = ["path"]
properties = { path = { type = "string" }, relative_path = { type = "string", description = "DEPRECATED v1.13.23 — use `path`. Soft alias maintained until v1.14.0." }, start_line = { type = "integer" }, end_line = { type = "integer" } }

