annotations = "ro_a"
feature_gate = "semantic"

[tool.input_schema]
type = "object"
required = ["file_path", "symbol_name"]
properties = { file_path = { type = "string", description = "Path of the file containing the target symbol" }, symbol_name = { type = "string", description = "Name of the target symbol to find neighbours of" }, max_results = { type = "integer", minimum = 1, maximum = 100, description = "Cap on returned similar symbols (default 10)" }, min_similarity = { type = "number", minimum = 0, maximum = 1, description = "Filter threshold on similarity score (default 0.3)" } }

