name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
      - "codex/**"
      - "feat/**"
      - "refactor/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-v2-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-v2-

      - name: repo-local quality gate
        shell: bash
        run: ./scripts/quality-gate.sh --mode ci

      - name: dataset hygiene lint
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python3 benchmarks/lint-datasets.py --project .

      - name: cargo test (mcp + http)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p codelens-mcp --features http

      - name: HTTP test stability (3x repeat)
        if: matrix.os == 'ubuntu-latest'
        run: |
          for i in 1 2 3; do
            echo "=== HTTP stability run $i ==="
            cargo test -p codelens-mcp --features http 2>&1 | tail -1
          done

      - name: cargo build --release (http for benchmark gate)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --release --features http

      - name: resolve HTTP surface benchmark baseline
        if: matrix.os == 'ubuntu-latest'
        id: http_surface_baseline_ref
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          echo "sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Using baseline commit: $BASE_SHA"

      - name: build baseline release (http for surface benchmark)
        if: matrix.os == 'ubuntu-latest'
        id: http_surface_baseline_build
        shell: bash
        run: |
          BASE_SHA="${{ steps.http_surface_baseline_ref.outputs.sha }}"
          BASE_WORKTREE="$(mktemp -d)"
          BASE_TARGET_DIR="$RUNNER_TEMP/codelens-http-surface-baseline-target"
          trap 'git worktree remove --force "$BASE_WORKTREE" >/dev/null 2>&1 || true' EXIT
          git worktree add --detach "$BASE_WORKTREE" "$BASE_SHA"
          CARGO_TARGET_DIR="$BASE_TARGET_DIR" cargo build \
            --release \
            --features http \
            -p codelens-mcp \
            --manifest-path "$BASE_WORKTREE/Cargo.toml"
          echo "binary=$BASE_TARGET_DIR/release/codelens-mcp" >> "$GITHUB_OUTPUT"

      - name: HTTP surface benchmark summary
        if: matrix.os == 'ubuntu-latest'
        env:
          CODELENS_BIN: target/release/codelens-mcp
        run: |
          python3 benchmarks/http-surface-benchmark.py . \
            --baseline-binary "${{ steps.http_surface_baseline_build.outputs.binary }}" \
            --candidate-binary target/release/codelens-mcp \
            --iterations 3 \
            --output-json benchmarks/http-surface-benchmark.json \
            --markdown-output benchmarks/http-surface-benchmark.md | tee benchmarks/http-surface-benchmark-ci.txt
          cat benchmarks/http-surface-benchmark.md >> "$GITHUB_STEP_SUMMARY"

      - name: token-efficiency benchmark gate
        if: matrix.os == 'ubuntu-latest'
        env:
          CODELENS_BIN: target/release/codelens-mcp
        run: |
          python3 benchmarks/token-efficiency.py . \
            --check \
            --require-handle-win \
            --min-workflow-savings 35 \
            --min-chain-reduction 40 \
            --min-queue-depth 1 \
            --min-peak-workers 2 \
            --min-queue-success-rate 1.0 \
            --max-queue-failures 0 | tee benchmarks/token-efficiency-ci.txt
          python3 benchmarks/render-summary.py --output benchmarks/token-efficiency-summary.md
          cat benchmarks/token-efficiency-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: embedding-quality benchmark summary
        if: matrix.os == 'ubuntu-latest'
        env:
          CODELENS_BIN: target/release/codelens-mcp
        run: |
          python3 benchmarks/embedding-quality.py . \
            --binary target/release/codelens-mcp \
            --output benchmarks/embedding-quality-results.json \
            --markdown-output benchmarks/embedding-quality-summary.md | tee benchmarks/embedding-quality-ci.txt
          cat benchmarks/embedding-quality-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: external phase3 matrix summary
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 benchmarks/embedding-quality-matrix.py \
            --require-datasets ripgrep,requests,jest,typescript,next-js,react-core,django,axum
          cat benchmarks/embedding-quality-phase3-matrix.md >> "$GITHUB_STEP_SUMMARY"

      - name: upload benchmark artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: token-efficiency-benchmark
          path: |
            benchmarks/benchmark_results.json
            benchmarks/token-efficiency-ci.txt
            benchmarks/token-efficiency-summary.md
            benchmarks/embedding-quality-results.json
            benchmarks/embedding-quality-ci.txt
            benchmarks/embedding-quality-summary.md
            benchmarks/embedding-quality-phase3-matrix.json
            benchmarks/embedding-quality-phase3-matrix.md
            benchmarks/http-surface-benchmark.json
            benchmarks/http-surface-benchmark.md
            benchmarks/http-surface-benchmark-ci.txt
