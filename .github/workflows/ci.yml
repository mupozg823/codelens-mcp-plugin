name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-v2-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-v2-

      - name: repo-local quality gate
        shell: bash
        run: ./scripts/quality-gate.sh --mode ci

      - name: cargo test (mcp + http)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p codelens-mcp --features http

      - name: HTTP test stability (3x repeat)
        if: matrix.os == 'ubuntu-latest'
        run: |
          for i in 1 2 3; do
            echo "=== HTTP stability run $i ==="
            cargo test -p codelens-mcp --features http 2>&1 | tail -1
          done

      - name: cargo build --release (http for benchmark gate)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --release --features http

      - name: token-efficiency benchmark gate
        if: matrix.os == 'ubuntu-latest'
        env:
          CODELENS_BIN: target/release/codelens-mcp
        run: |
          python3 benchmarks/token-efficiency.py . \
            --check \
            --require-handle-win \
            --min-workflow-savings 35 \
            --min-chain-reduction 40 \
            --min-queue-depth 1 \
            --min-peak-workers 2 \
            --min-queue-success-rate 1.0 \
            --max-queue-failures 0 | tee benchmarks/token-efficiency-ci.txt
          python3 benchmarks/render-summary.py --output benchmarks/token-efficiency-summary.md
          cat benchmarks/token-efficiency-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: embedding-quality benchmark summary
        if: matrix.os == 'ubuntu-latest'
        env:
          CODELENS_BIN: target/release/codelens-mcp
        run: |
          python3 benchmarks/embedding-quality.py . \
            --binary target/release/codelens-mcp \
            --output benchmarks/embedding-quality-results.json \
            --markdown-output benchmarks/embedding-quality-summary.md | tee benchmarks/embedding-quality-ci.txt
          cat benchmarks/embedding-quality-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: upload benchmark artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: token-efficiency-benchmark
          path: |
            benchmarks/benchmark_results.json
            benchmarks/token-efficiency-ci.txt
            benchmarks/token-efficiency-summary.md
            benchmarks/embedding-quality-results.json
            benchmarks/embedding-quality-ci.txt
            benchmarks/embedding-quality-summary.md
