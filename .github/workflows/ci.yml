name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

# 2026-07-09 restructure: the former single 25-step serial job put hygiene,
# the full feature matrix, coverage, security audit, and TWO cold release
# builds on one 16-minute critical path (macos). Split into parallel jobs so
# the PR gate's wall clock is the slowest independent job, moved the release
# dry-run to main pushes only, and moved `cargo audit` to its own scheduled
# workflow (audit.yml) — advisories are time-driven, not PR-driven.
jobs:
  # Fast platform-independent gates: formatting, codegen drift, manifests,
  # script contracts. No cargo build required beyond fmt.
  hygiene:
    runs-on: ubuntu-latest
    env:
      # No sccache-action in this job — unset the global wrapper so any
      # cargo invocation here doesn't fail on a missing sccache binary.
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: tool-defs codegen drift check
        run: python3 scripts/regen-tool-defs.py --check --enforce-drift

      - name: surface manifest drift check
        run: python3 scripts/surface-manifest.py --check

      - name: runtime snapshot generator smoke check
        run: python3 scripts/runtime-snapshot.py --source-only > /tmp/codelens-runtime-snapshot.json

      - name: plugin manifest validation
        run: python3 scripts/validate-plugin-manifest.py --check

      - name: bench invocation lint
        # Guard against the 2026-05 regression where `benchmark.yml` was
        # the lone `cargo bench` invocation without `--bench <name>` /
        # `--benches`, crashing the Benchmark workflow for 8 commits.
        # See scripts/lint-bench-invocations.py + commit 10ac00d6.
        run: python3 scripts/lint-bench-invocations.py

      - name: script contract tests
        run: |
          for test in scripts/test/test-*.py; do
            python3 "$test"
          done

  # Full feature-matrix verification on linux (cached). Platform-independent
  # gates (clippy, doctest, feature combos) run once, here.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo check (http)
        run: cargo check --workspace --features http

      - name: cargo check (otel)
        run: cargo check --workspace --features otel

      - name: cargo check (scip-backend)
        run: cargo check --workspace --features scip-backend

      - name: cargo check (semantic-off)
        run: cargo check --workspace --no-default-features

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: cargo clippy (http)
        run: cargo clippy --workspace --features http -- -D warnings

      - name: cargo clippy (otel)
        run: cargo clippy --workspace --features otel -- -D warnings

      - name: cargo clippy (scip-backend)
        run: cargo clippy --workspace --features scip-backend -- -D warnings

      - name: cargo clippy (semantic-off)
        run: cargo clippy --workspace --no-default-features -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo test (nextest)
        run: cargo nextest run --workspace

      - name: cargo test (http)
        run: cargo nextest run --workspace --features http

      - name: cargo test (semantic-off)
        run: cargo nextest run --workspace --no-default-features

      # v1.12.0: explicit call-graph accuracy gate. The
      # `call_graph_accuracy_meets_threshold` integration test is
      # already exercised by the workspace nextest run above; this step
      # surfaces it as a named CI gate so an accuracy regression
      # (precision/recall/F1 dipping below the threshold declared in
      # benchmarks/call-graph-accuracy/expected.json) shows up as a
      # discrete failure with the per-fixture diff in stdout. See
      # crates/codelens-engine/tests/call_graph_accuracy.rs.
      - name: call-graph accuracy bench
        run: cargo test -p codelens-engine --test call_graph_accuracy -- --nocapture

      # v1.13.22: ranking signal regression gate. The PageRank →
      # search_symbols_hybrid integration shipped in v1.13.16 (Phase
      # 3-A) is wired through several hops; isolated unit tests in
      # search.rs::tests cannot catch a hop being silently disconnected
      # (e.g. handler.rs forgetting to forward the Option, or signature
      # contract drifting). Running this on its own line surfaces such
      # regressions as a discrete CI failure.
      - name: ranking signal regression gate
        run: cargo test -p codelens-engine --test ranking_pagerank_effect -- --nocapture

      - name: cargo doctest
        run: cargo test --doc --workspace

      - name: cargo doc
        run: cargo doc --workspace --no-deps

  # macOS platform smoke: the OS-specific signal (filesystem, watcher, LSP
  # process behavior) without repeating the platform-independent matrix.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache
        # 2026-05-14 PR #292: Swatinem/rust-cache on macos-latest restored a
        # stale cargo binary via partial-match cache; the cache stays
        # disabled here (sccache alone) until that infra issue is re-verified.
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo test (http)
        run: cargo nextest run --workspace --features http

      - name: cargo test (nextest)
        run: cargo nextest run --workspace

  # Coverage is informational (fail_ci_if_error: false) — run it in parallel
  # instead of serializing it into the merge-gate path.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Code coverage
        run: |
          mkdir -p target/coverage
          cargo llvm-cov --workspace --lcov --output-path target/coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/coverage/lcov.info
          fail_ci_if_error: false

  # Release packaging dry-run: two cold release-profile builds (~5.5 min on
  # macos) that verify PACKAGING, not code — main pushes only. PR-introduced
  # packaging regressions surface on the merge commit's run; code regressions
  # are already covered by the check/test matrix above.
  release-dry-run:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Cold builds by design (PR #292: sccache temp-dir loss on macos) —
      # and this job never installs the sccache binary.
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        # sccache is deliberately not configured in this job (PR #292 batch:
        # the wrapper loses its temp dir on macos after long stages, failing
        # proc-macro builds) — these are cold builds by design.
        run: cargo build --release --bin codelens-mcp

      - name: Stage release model assets
        run: bash scripts/stage-release-model-assets.sh

      - name: Release package dry-run
        run: |
          bash scripts/package-release-artifact.sh \
            --name ci-dry-run \
            --binary target/release/codelens-mcp \
            --binary-name codelens-mcp \
            --archive-ext .tar.gz \
            --output-dir target/release-dry-run

      - name: Upload release artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-${{ matrix.os }}
          path: target/release/codelens-mcp

      - name: Build release binary (semantic-off)
        run: cargo build --release --bin codelens-mcp --no-default-features

      - name: Upload slim release artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-slim-${{ matrix.os }}
          path: target/release/codelens-mcp
