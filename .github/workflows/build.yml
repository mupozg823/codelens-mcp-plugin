name: Build & Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    name: Rust Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Test
        working-directory: rust
        run: cargo test

      - name: Benchmark
        working-directory: rust
        run: cargo bench --bench indexing -- --output-format bencher | tee bench-output.txt

      - name: Build Release
        working-directory: rust
        run: cargo build --release

      - name: Upload Rust Binary
        uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-binary
          path: rust/target/release/codelens-mcp

  plugin:
    name: IntelliJ Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Verify Plugin
        run: ./gradlew verifyPlugin

      - name: Upload Plugin
        uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-plugin
          path: build/distributions/*.zip
          retention-days: 14
