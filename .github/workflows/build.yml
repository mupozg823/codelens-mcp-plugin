name: Build & Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('Cargo.lock') }}

      - name: repo-local build gate
        shell: bash
        run: ./scripts/quality-gate.sh --mode build

      - name: Benchmark
        run: cargo bench --bench indexing -- --output-format bencher | tee bench-output.txt

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp
          path: target/release/codelens-mcp
