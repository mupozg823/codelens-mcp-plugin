name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
            ext: ""
            archive_ext: ".tar.gz"
          # x86_64-apple-darwin removed: ort-sys has no prebuilt binaries
          # aarch64-unknown-linux-gnu removed: openssl cross-compile fails with ort
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            ext: ""
            archive_ext: ".tar.gz"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: ".exe"
            archive_ext: ".zip"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Build
        run: cargo build --release --features http --target ${{ matrix.target }}

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          cargo cyclonedx \
            --manifest-path Cargo.toml \
            --format json \
            --describe binaries \
            --spec-version 1.5 \
            --target ${{ matrix.target }} \
            --target-in-filename
          cp "crates/codelens-mcp/codelens-mcp_bin_${{ matrix.target }}.cdx.json" \
            "codelens-mcp-${{ matrix.name }}.cdx.json"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/codelens-mcp codelens-mcp
          tar czf codelens-mcp-${{ matrix.name }}.tar.gz codelens-mcp

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/codelens-mcp.exe codelens-mcp.exe
          7z a codelens-mcp-${{ matrix.name }}.zip codelens-mcp.exe

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/codelens-mcp-${{ matrix.name }}${{ matrix.archive_ext }}

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/codelens-mcp-${{ matrix.name }}${{ matrix.archive_ext }}
          sbom-path: ${{ github.workspace }}/codelens-mcp-${{ matrix.name }}.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-${{ matrix.name }}
          path: codelens-mcp-${{ matrix.name }}.*

  publish:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Prepare OCI image context
        run: |
          mkdir -p oci-image/models
          tar -xzf codelens-mcp-linux-x86_64.tar.gz -C oci-image
          if [[ -f crates/codelens-engine/models/codesearch/model.onnx ]]; then
            cp -R crates/codelens-engine/models/codesearch oci-image/models/
          fi
          cp Dockerfile.release oci-image/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push OCI image
        uses: docker/build-push-action@v7
        with:
          context: ./oci-image
          file: ./oci-image/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Detect bundled model payload
        id: bundled_model
        run: |
          if [[ -f crates/codelens-engine/models/codesearch/model.onnx ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping air-gapped bundle: model.onnx is not staged in this checkout."
          fi

      - name: Build air-gapped bundle
        if: steps.bundled_model.outputs.available == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build-airgap-bundle.sh \
            --archive codelens-mcp-linux-x86_64.tar.gz \
            --sbom codelens-mcp-linux-x86_64.cdx.json \
            --platform linux-x86_64 \
            --version "${VERSION}" \
            --models-dir crates/codelens-engine/models \
            --output codelens-mcp-airgap-linux-x86_64.tar.gz

      - name: Generate payload checksums
        run: |
          find . -maxdepth 1 -type f \
            \( -name 'codelens-mcp-*.tar.gz' -o -name 'codelens-mcp-*.zip' -o -name 'codelens-mcp-*.cdx.json' \) \
            -print \
            | sed 's#^\./##' \
            | LC_ALL=C sort \
            | while IFS= read -r asset; do
                sha256sum "$asset"
              done > release-payload-checksums-sha256.txt

      - name: Generate release manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/generate-release-manifest.py \
            --bundle-dir . \
            --checksums release-payload-checksums-sha256.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --version "${VERSION}" \
            --image "ghcr.io/${GITHUB_REPOSITORY}" \
            --output release-manifest.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        env:
          COSIGN_YES: "true"
        run: |
          find . -maxdepth 1 -type f \
            \( -name 'codelens-mcp-airgap-*.tar.gz' -o -name 'codelens-mcp-*.tar.gz' -o -name 'codelens-mcp-*.zip' -o -name 'codelens-mcp-*.cdx.json' -o -name 'release-manifest.json' \) \
            -print \
            | sed 's#^\./##' \
            | LC_ALL=C sort \
            | while IFS= read -r asset; do
                cosign sign-blob \
                  --yes \
                  --output-signature "${asset}.sig" \
                  --output-certificate "${asset}.pem" \
                  "$asset"
              done

      - name: Generate final checksums
        run: |
          find . -maxdepth 1 -type f \
            \( -name 'codelens-mcp-airgap-*.tar.gz' -o -name 'codelens-mcp-*.tar.gz' -o -name 'codelens-mcp-*.zip' -o -name 'codelens-mcp-*.cdx.json' -o -name 'release-manifest.json' -o -name 'codelens-mcp-airgap-*.tar.gz.sig' -o -name 'codelens-mcp-airgap-*.tar.gz.pem' -o -name 'codelens-mcp-*.tar.gz.sig' -o -name 'codelens-mcp-*.tar.gz.pem' -o -name 'codelens-mcp-*.zip.sig' -o -name 'codelens-mcp-*.zip.pem' -o -name 'codelens-mcp-*.cdx.json.sig' -o -name 'codelens-mcp-*.cdx.json.pem' -o -name 'release-manifest.json.sig' -o -name 'release-manifest.json.pem' \) \
            -print \
            | sed 's#^\./##' \
            | LC_ALL=C sort \
            | while IFS= read -r asset; do
                sha256sum "$asset"
              done > checksums-sha256.txt
          rm -f release-payload-checksums-sha256.txt

      - name: Verify release artifacts before publish
        run: |
          bash scripts/verify-release-artifacts.sh . \
            --require-targets darwin-arm64,linux-x86_64,windows-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            codelens-mcp-airgap-*.tar.gz
            codelens-mcp-*.tar.gz
            codelens-mcp-*.zip
            codelens-mcp-*.cdx.json
            release-manifest.json
            codelens-mcp-airgap-*.tar.gz.sig
            codelens-mcp-airgap-*.tar.gz.pem
            codelens-mcp-*.tar.gz.sig
            codelens-mcp-*.tar.gz.pem
            codelens-mcp-*.zip.sig
            codelens-mcp-*.zip.pem
            codelens-mcp-*.cdx.json.sig
            codelens-mcp-*.cdx.json.pem
            release-manifest.json.sig
            release-manifest.json.pem
            checksums-sha256.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [publish]
    runs-on: ubuntu-latest
    # Skip when the tap push token is not configured. The publish job has
    # already uploaded binaries and the GitHub Release; homebrew tap sync
    # is a best-effort secondary channel.
    if: ${{ vars.TAP_ENABLED == 'true' || secrets.TAP_GITHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Wait for CDN propagation after release asset upload
          sleep 15
          curl -fsSL --retry 5 --retry-delay 10 \
            "https://github.com/mupozg823/codelens-mcp-plugin/releases/download/${TAG}/checksums-sha256.txt" \
            -o checksums.txt

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SHA_DARWIN_ARM64=$(awk '/ codelens-mcp-darwin-arm64.tar.gz$/ {print $1}' checksums.txt)" >> $GITHUB_ENV
          echo "SHA_LINUX_X86_64=$(awk '/ codelens-mcp-linux-x86_64.tar.gz$/ {print $1}' checksums.txt)" >> $GITHUB_ENV

      - name: Generate formula with real checksums
        run: |
          sed -e "s/RELEASE_SHA256_DARWIN_ARM64/${SHA_DARWIN_ARM64}/" \
              -e "s/RELEASE_SHA256_LINUX_X86_64/${SHA_LINUX_X86_64}/" \
              -e "s/version \".*\"/version \"${VERSION}\"/" \
              Formula/codelens-mcp.rb > codelens-mcp.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/mupozg823/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp codelens-mcp.rb tap/Formula/codelens-mcp.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/codelens-mcp.rb
          git diff --cached --quiet || git commit -m "codelens-mcp ${VERSION}"
          git push
