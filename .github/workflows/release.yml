name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  rust-binary:
    name: Rust (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            name: darwin-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build
        working-directory: rust
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cp rust/target/${{ matrix.target }}/release/codelens-mcp codelens-mcp
          tar czf codelens-mcp-${{ matrix.name }}.tar.gz codelens-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-${{ matrix.name }}
          path: codelens-mcp-${{ matrix.name }}.tar.gz

  plugin:
    name: IntelliJ Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew buildPlugin
      - uses: actions/upload-artifact@v4
        with:
          name: codelens-intellij-plugin
          path: build/distributions/*.zip

  publish:
    name: GitHub Release
    needs: [rust-binary, plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            codelens-mcp-*.tar.gz
            *.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
