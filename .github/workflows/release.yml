name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
            ext: ""
          # x86_64-apple-darwin removed: ort-sys has no prebuilt binaries for this target
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked
        env:
          CROSS_CONTAINER_OPTS: "--env OPENSSL_STATIC=1"

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/codelens-mcp codelens-mcp
          tar czf codelens-mcp-${{ matrix.name }}.tar.gz codelens-mcp

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/codelens-mcp.exe codelens-mcp.exe
          7z a codelens-mcp-${{ matrix.name }}.zip codelens-mcp.exe

      - uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-${{ matrix.name }}
          path: codelens-mcp-${{ matrix.name }}.*

  publish:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum codelens-mcp-* > checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            codelens-mcp-*.tar.gz
            codelens-mcp-*.zip
            checksums-sha256.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/mupozg823/codelens-mcp-plugin/releases/download/${TAG}/checksums-sha256.txt" \
            -o checksums.txt

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SHA_DARWIN_ARM64=$(grep darwin-arm64 checksums.txt | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX_X86_64=$(grep linux-x86_64 checksums.txt | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(grep linux-arm64 checksums.txt | awk '{print $1}')" >> $GITHUB_ENV

      - name: Generate formula with real checksums
        run: |
          sed -e "s/RELEASE_SHA256_DARWIN_ARM64/${SHA_DARWIN_ARM64}/" \
              -e "s/RELEASE_SHA256_LINUX_X86_64/${SHA_LINUX_X86_64}/" \
              -e "s/RELEASE_SHA256_LINUX_ARM64/${SHA_LINUX_ARM64}/" \
              -e "s/version \".*\"/version \"${VERSION}\"/" \
              Formula/codelens-mcp.rb > codelens-mcp.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/mupozg823/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp codelens-mcp.rb tap/Formula/codelens-mcp.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/codelens-mcp.rb
          git diff --cached --quiet || git commit -m "codelens-mcp ${VERSION}"
          git push
