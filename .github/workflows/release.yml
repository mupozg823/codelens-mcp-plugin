name: Release

on:
  push:
    tags:
      - 'v*'

env:
  # Some actions@v4 are still bundled on Node 20; keeping the opt-in until
  # all used actions ship a Node 24 variant prevents deprecation annotations.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
            ext: ""
            archive_ext: ".tar.gz"
          # x86_64-apple-darwin removed: ort-sys has no prebuilt binaries
          # aarch64-unknown-linux-gnu removed: openssl cross-compile fails with ort
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            ext: ""
            archive_ext: ".tar.gz"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: ".exe"
            archive_ext: ".zip"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Build
        run: cargo build --release --features http --target ${{ matrix.target }}

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          cargo cyclonedx \
            --manifest-path Cargo.toml \
            --format json \
            --describe binaries \
            --spec-version 1.5 \
            --target ${{ matrix.target }} \
            --target-in-filename
          cp "crates/codelens-mcp/codelens-mcp_bin_${{ matrix.target }}.cdx.json" \
            "codelens-mcp-${{ matrix.name }}.cdx.json"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/codelens-mcp codelens-mcp
          mkdir -p models/codesearch
          cp crates/codelens-engine/models/codesearch/{model.onnx,tokenizer.json,config.json,special_tokens_map.json,tokenizer_config.json} models/codesearch/
          python3 scripts/verify-model-assets.py --root . --check
          tar czf codelens-mcp-${{ matrix.name }}.tar.gz codelens-mcp models
          python3 scripts/verify-model-assets.py --archive codelens-mcp-${{ matrix.name }}.tar.gz --check

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/codelens-mcp.exe codelens-mcp.exe
          mkdir -p models/codesearch
          cp crates/codelens-engine/models/codesearch/{model.onnx,tokenizer.json,config.json,special_tokens_map.json,tokenizer_config.json} models/codesearch/
          python3 scripts/verify-model-assets.py --root . --check
          7z a codelens-mcp-${{ matrix.name }}.zip codelens-mcp.exe models
          python3 scripts/verify-model-assets.py --archive codelens-mcp-${{ matrix.name }}.zip --check

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/codelens-mcp-${{ matrix.name }}${{ matrix.archive_ext }}

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/codelens-mcp-${{ matrix.name }}${{ matrix.archive_ext }}
          sbom-path: ${{ github.workspace }}/codelens-mcp-${{ matrix.name }}.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: codelens-mcp-${{ matrix.name }}
          path: codelens-mcp-${{ matrix.name }}.*

  upstream-smoke:
    name: Upstream smoke gate
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: codelens-mcp-linux-x86_64

      - name: Extract release binary
        run: tar -xzf codelens-mcp-linux-x86_64.tar.gz

      - name: Verify bundled model assets
        run: python3 scripts/verify-model-assets.py --root . --check

      - name: Run upstream project smoke matrix
        env:
          CODELENS_MODEL_DIR: models
        run: |
          python3 benchmarks/external-project-smoke.py \
            --binary ./codelens-mcp \
            --matrix benchmarks/external-project-smoke-upstream-matrix.json \
            --output benchmarks/external-project-smoke-upstream-results.json \
            --timeout 420 \
            --check

      - name: Upload upstream smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-smoke-results
          path: benchmarks/external-project-smoke-upstream-results.json

  publish:
    name: GitHub Release
    needs: [build, upstream-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Prepare OCI image context
        run: |
          mkdir -p oci-image/models/codesearch
          tar -xzf codelens-mcp-linux-x86_64.tar.gz -C oci-image
          cp crates/codelens-engine/models/codesearch/{model.onnx,tokenizer.json,config.json,special_tokens_map.json,tokenizer_config.json} oci-image/models/codesearch/
          python3 scripts/verify-model-assets.py --root oci-image --check
          cp Dockerfile.release oci-image/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push OCI image
        uses: docker/build-push-action@v7
        with:
          context: ./oci-image
          file: ./oci-image/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Detect bundled model payload
        id: bundled_model
        run: |
          python3 scripts/verify-model-assets.py --root crates/codelens-engine/models --check
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Build air-gapped bundle
        if: steps.bundled_model.outputs.available == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build-airgap-bundle.sh \
            --archive codelens-mcp-linux-x86_64.tar.gz \
            --sbom codelens-mcp-linux-x86_64.cdx.json \
            --platform linux-x86_64 \
            --version "${VERSION}" \
            --models-dir crates/codelens-engine/models \
            --output codelens-mcp-airgap-linux-x86_64.tar.gz

      - name: Generate payload checksums
        run: |
          find . -maxdepth 1 -type f \
            \( -name 'codelens-mcp-*.tar.gz' -o -name 'codelens-mcp-*.zip' -o -name 'codelens-mcp-*.cdx.json' \) \
            -print \
            | sed 's#^\./##' \
            | LC_ALL=C sort \
            | while IFS= read -r asset; do
                sha256sum "$asset"
              done > release-payload-checksums-sha256.txt

      - name: Generate release manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/generate-release-manifest.py \
            --bundle-dir . \
            --checksums release-payload-checksums-sha256.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --version "${VERSION}" \
            --image "ghcr.io/${GITHUB_REPOSITORY}" \
            --output release-manifest.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        env:
          COSIGN_YES: "true"
        run: |
          find . -maxdepth 1 -type f \
            \( -name 'codelens-mcp-airgap-*.tar.gz' -o -name 'codelens-mcp-*.tar.gz' -o -name 'codelens-mcp-*.zip' -o -name 'codelens-mcp-*.cdx.json' -o -name 'release-manifest.json' \) \
            -print \
            | sed 's#^\./##' \
            | LC_ALL=C sort \
            | while IFS= read -r asset; do
                cosign sign-blob \
                  --yes \
                  --output-signature "${asset}.sig" \
                  --output-certificate "${asset}.pem" \
                  "$asset"
              done

      - name: Generate final checksums
        run: |
          find . -maxdepth 1 -type f \
            \( -name 'codelens-mcp-airgap-*.tar.gz' -o -name 'codelens-mcp-*.tar.gz' -o -name 'codelens-mcp-*.zip' -o -name 'codelens-mcp-*.cdx.json' -o -name 'release-manifest.json' -o -name 'codelens-mcp-airgap-*.tar.gz.sig' -o -name 'codelens-mcp-airgap-*.tar.gz.pem' -o -name 'codelens-mcp-*.tar.gz.sig' -o -name 'codelens-mcp-*.tar.gz.pem' -o -name 'codelens-mcp-*.zip.sig' -o -name 'codelens-mcp-*.zip.pem' -o -name 'codelens-mcp-*.cdx.json.sig' -o -name 'codelens-mcp-*.cdx.json.pem' -o -name 'release-manifest.json.sig' -o -name 'release-manifest.json.pem' \) \
            -print \
            | sed 's#^\./##' \
            | LC_ALL=C sort \
            | while IFS= read -r asset; do
                sha256sum "$asset"
              done > checksums-sha256.txt
          rm -f release-payload-checksums-sha256.txt

      - name: Verify release artifacts before publish
        run: |
          bash scripts/verify-release-artifacts.sh . \
            --require-targets darwin-arm64,linux-x86_64,windows-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            codelens-mcp-airgap-*.tar.gz
            codelens-mcp-*.tar.gz
            codelens-mcp-*.zip
            codelens-mcp-*.cdx.json
            release-manifest.json
            codelens-mcp-airgap-*.tar.gz.sig
            codelens-mcp-airgap-*.tar.gz.pem
            codelens-mcp-*.tar.gz.sig
            codelens-mcp-*.tar.gz.pem
            codelens-mcp-*.zip.sig
            codelens-mcp-*.zip.pem
            codelens-mcp-*.cdx.json.sig
            codelens-mcp-*.cdx.json.pem
            release-manifest.json.sig
            release-manifest.json.pem
            checksums-sha256.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Wait for CDN propagation after release asset upload
          sleep 15
          curl -fsSL --retry 5 --retry-delay 10 \
            "https://github.com/mupozg823/codelens-mcp-plugin/releases/download/${TAG}/checksums-sha256.txt" \
            -o checksums.txt

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SHA_DARWIN_ARM64=$(awk '/ codelens-mcp-darwin-arm64.tar.gz$/ {print $1}' checksums.txt)" >> $GITHUB_ENV
          echo "SHA_LINUX_X86_64=$(awk '/ codelens-mcp-linux-x86_64.tar.gz$/ {print $1}' checksums.txt)" >> $GITHUB_ENV

      - name: Generate formula with real checksums
        run: |
          sed -e "s/RELEASE_SHA256_DARWIN_ARM64/${SHA_DARWIN_ARM64}/" \
              -e "s/RELEASE_SHA256_LINUX_X86_64/${SHA_LINUX_X86_64}/" \
              -e "s/version \".*\"/version \"${VERSION}\"/" \
              Formula/codelens-mcp.rb > codelens-mcp.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          # Tap sync is a best-effort secondary distribution channel. The
          # preceding publish job already shipped binaries and the GitHub
          # Release. When TAP_GITHUB_TOKEN is not configured for this repo,
          # skip cleanly instead of failing the entire workflow.
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "TAP_GITHUB_TOKEN is not set; skipping Homebrew tap push."
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/mupozg823/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp codelens-mcp.rb tap/Formula/codelens-mcp.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/codelens-mcp.rb
          git diff --cached --quiet || git commit -m "codelens-mcp ${VERSION}"
          git push

  publish-crates-io:
    name: Publish to crates.io
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # crates.io publish runs only when the API token is configured.
          # The workspace has three publishable crates with internal
          # path+version deps, so the publish order matters:
          #   codelens-engine  (leaf)
          # → codelens-mcp     (depends on engine)
          # → codelens-tui     (depends on engine)
          #
          # `cargo publish` waits for the registry index to become
          # consistent before returning, so subsequent publishes can
          # resolve the just-published dep. If the version already exists
          # on crates.io (e.g. a previous run published engine but the
          # workflow was retried), we treat that as a no-op rather than a
          # failure.
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is not set; skipping crates.io publish."
            exit 0
          fi

          publish_one() {
            local pkg="$1"
            echo "=== publishing $pkg ==="
            if cargo publish -p "$pkg" 2>&1 | tee /tmp/publish.log; then
              return 0
            fi
            if grep -q "crate version .* is already uploaded" /tmp/publish.log; then
              echo "$pkg already published at this version; continuing."
              return 0
            fi
            echo "$pkg publish failed; aborting."
            return 1
          }

          publish_one codelens-engine
          publish_one codelens-mcp
          publish_one codelens-tui
