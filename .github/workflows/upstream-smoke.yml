name: Upstream Smoke

on:
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upstream-smoke:
    name: Upstream smoke matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-v2-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-upstream-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-upstream-v1-

      - name: Build release binary
        run: cargo build --release --features http,semantic -p codelens-mcp

      - name: Stage release model assets
        run: bash scripts/stage-release-model-assets.sh

      - name: Verify bundled model assets
        run: python3 scripts/verify-model-assets.py --root crates/codelens-engine/models --check

      - name: Smoke embedding coverage report
        env:
          CODELENS_MODEL_DIR: ${{ github.workspace }}/crates/codelens-engine/models
        run: |
          set -o pipefail
          python3 scripts/smoke-embedding-coverage.py \
            --binary target/release/codelens-mcp \
            --project . \
            | tee benchmarks/embedding-coverage-smoke.txt

      - name: Run semantic index lifecycle benchmark
        env:
          CODELENS_MODEL_DIR: ${{ github.workspace }}/crates/codelens-engine/models
        run: |
          python3 benchmarks/embedding-index-lifecycle.py . \
            --binary target/release/codelens-mcp \
            --output benchmarks/codelens-index-lifecycle.json \
            --timeout 420

      - name: Run self retrieval quality gate
        env:
          CODELENS_MODEL_DIR: ${{ github.workspace }}/crates/codelens-engine/models
        run: |
          python3 benchmarks/embedding-quality.py . \
            --binary target/release/codelens-mcp \
            --output benchmarks/codelens-self-retrieval-quality.json \
            --stdout summary \
            --markdown-output benchmarks/codelens-self-retrieval-quality.md \
            --triage-output benchmarks/codelens-self-retrieval-triage.json \
            --check \
            --min-hybrid-mrr 0.70 \
            --min-lexical-mrr 0.50 \
            --min-hybrid-mrr-by-query-type natural_language=0.55 \
            --min-hybrid-recall-by-query-type issue_to_edit=0.80 \
            --max-hybrid-candidate-missing-rate 0.10 \
            --max-hybrid-p95-response-tokens 20000

      - name: Run fast fixture project smoke matrix
        env:
          CODELENS_MODEL_DIR: ${{ github.workspace }}/crates/codelens-engine/models
        run: |
          python3 benchmarks/external-project-smoke.py \
            --binary target/release/codelens-mcp \
            --matrix benchmarks/external-project-smoke-matrix.json \
            --output benchmarks/external-project-smoke-results.json \
            --timeout 180 \
            --check

      - name: Run upstream project smoke matrix
        env:
          CODELENS_MODEL_DIR: ${{ github.workspace }}/crates/codelens-engine/models
        run: |
          python3 benchmarks/external-project-smoke.py \
            --binary target/release/codelens-mcp \
            --matrix benchmarks/external-project-smoke-upstream-matrix.json \
            --output benchmarks/external-project-smoke-upstream-results.json \
            --timeout 420 \
            --check

      - name: Upload upstream smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-smoke-results
          path: |
            benchmarks/embedding-coverage-smoke.txt
            benchmarks/codelens-index-lifecycle.json
            benchmarks/codelens-self-retrieval-quality.json
            benchmarks/codelens-self-retrieval-quality.md
            benchmarks/codelens-self-retrieval-triage.json
            benchmarks/external-project-smoke-results.json
            benchmarks/external-project-smoke-upstream-results.json
